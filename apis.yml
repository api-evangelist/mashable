aid: mashable
name: Mashable
description: Mashable is a digital media and entertainment company covering tech, culture, and digital trends. Founded in
  2005, Mashable has grown into a global, multi-platform media and entertainment company. Mashable does not publish a first-party
  REST API, but its headlines and articles are accessible via the third-party News API REST service.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
tags:
