apis:
- aid: mashable:mashable-via-newsapi
  name: Mashable via News API
  description: Mashable content is accessible via the News API, a third-party REST API that provides live headlines, articles,
    images, and metadata from Mashable and over 150,000 other worldwide news sources. Developers can search Mashable content
    using the source identifier "mashable" to retrieve top headlines and historical articles published by Mashable. The API
    returns structured JSON responses including article title, description, URL, image URL, publication date, and author.
    An API key is required to authenticate requests.
  humanURL: https://newsapi.org/s/mashable-api
  baseURL: https://newsapi.org/v2
