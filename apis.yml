apis:
  - aid: mashable:mashable-via-newsapi
    name: Mashable via News API
    tags:
      - Articles
      - Headlines
      - News
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://newsapi.org
    humanURL: https://newsapi.org/s/mashable-api
    properties:
      - url: https://newsapi.org/s/mashable-api
        type: Documentation
      - url: https://newsapi.org/docs/get-started
        type: GettingStarted
      - url: https://newsapi.org/docs/endpoints/top-headlines
        type: Endpoints
      - url: https://newsapi.org/docs/endpoints/everything
        type: Endpoints
    description: >-
      Mashable content is accessible via the News API, a third-party REST API that
      provides live headlines, articles, images, and metadata from Mashable and over
      150,000 other worldwide news sources. Developers can search Mashable content
      using the source identifier "mashable" to retrieve top headlines and historical
      articles published by Mashable. The API returns structured JSON responses including
      article title, description, URL, image URL, publication date, and author.
